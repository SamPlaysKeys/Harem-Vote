version: '3.8'

services:
  db:
    image: postgres:16-alpine
    container_name: haremvote-db
    environment:
      POSTGRES_USER: haremvote
      POSTGRES_PASSWORD: localdev
      POSTGRES_DB: haremvote
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U haremvote -d haremvote']
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
